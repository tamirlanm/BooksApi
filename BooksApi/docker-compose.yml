services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=12345
      - POSTGRES_DB=booksdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/postgres_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
  api:
    build: .
    ports:
      - "5000:80"
    environment:
      ConnectionStrings__Default: "Host=postgres;Database=booksdb;Username=postgres;Password=12345"
      Jwt__Secret: "super-secret-key-minimum-32-characters!!"
      Jwt__Issuer: "BooksApi"
      Jwt__Audience: "BooksApiUsers"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: